<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Image Judge</title>
<style>
  body {
    font-family: system-ui, sans-serif;
    margin: 0;
    background: #1e1e1e;
    color: #ddd;
    height: 100vh;
    display: flex;
    flex-direction: column;
  }
  header, footer {
    padding: 0.5rem 1rem;
    background: #2a2a2a;
  }
  header {
    display: flex;
    gap: 1rem;
    align-items: center;
    flex-wrap: wrap;
  }
  #image-area {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    padding: 1rem;
  }
  #image-area img {
    max-width: 100%;
    max-height: 100%;
    object-fit: contain;
  }
  footer {
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
  }
  .row { display: flex; gap: 0.5rem; align-items: center; }
  .row.judge-buttons { flex-wrap: wrap; }
  .caption {
    color: #aaa;
    font-size: 0.9rem;
    word-break: break-word;
  }
  .source-dataset {
    color: #6cf;
    font-size: 0.8rem;
    margin-right: 0.4rem;
  }
  .current-ng-reason {
    color: #f99;
    font-size: 0.8rem;
    margin-left: 0.4rem;
  }
  textarea, select, input {
    background: #1a1a1a;
    color: #ddd;
    border: 1px solid #444;
    padding: 0.3rem;
    font-size: 0.9rem;
    font-family: inherit;
  }
  textarea { flex: 1; resize: vertical; min-height: 1.6em; }
  button {
    background: #444;
    color: #ddd;
    border: 1px solid #666;
    padding: 0.4rem 0.8rem;
    cursor: pointer;
    font-family: inherit;
    line-height: 1.2;
    text-align: left;
  }
  button.ok { background: #2d6e2d; border-color: #4a9a4a; min-width: 4rem; text-align: center; }
  button.ng { background: #6e2d2d; border-color: #9a4a4a; }
  button.ng small {
    display: block;
    font-size: 0.7rem;
    color: #f3c4c4;
    margin-top: 0.15rem;
    font-weight: normal;
  }
  button:hover { filter: brightness(1.2); }
  .hint { color: #888; font-size: 0.85rem; margin-left: auto; }
  .mode-group, .status-group { display: flex; gap: 0.4rem; align-items: center; }
  .mode-group label, .status-group label { cursor: pointer; }
  .status-group { padding-left: 0.4rem; border-left: 1px solid #444; }
</style>
</head>
<body>
<header>
  <div class="mode-group">
    <label><input type="radio" name="mode" value="single" checked> Single</label>
    <label><input type="radio" name="mode" value="all"> All (集約)</label>
  </div>
  <span id="single-controls">
    Dataset: <select id="dataset-select"></select>
    <span class="status-group">
      <label><input type="radio" name="status" value="pending" checked> pending</label>
      <label><input type="radio" name="status" value="ok"> ok</label>
      <label><input type="radio" name="status" value="ng"> ng</label>
    </span>
  </span>
  <span id="all-controls" style="display:none">
    集約先:
    <input type="text" id="target-dataset-input" list="datasets-list" placeholder="例: character_a_final" size="22">
    <datalist id="datasets-list"></datalist>
  </span>
  <span id="counter"></span>
  <span class="hint">O = OK / 1-6 = NG (理由) / &larr; &rarr; 前後 / コメント中はキー無効</span>
</header>
<main id="image-area">
  <img id="current-image" alt="">
</main>
<footer>
  <div class="caption" id="caption-display"></div>
  <div class="row">
    <span>Comment:</span>
    <textarea id="comment-input" rows="1" placeholder="コメント (任意)"></textarea>
  </div>
  <div class="row judge-buttons">
    <button class="ok" id="btn-ok">[O] OK</button>
    <button class="ng" data-reason="キャラ違い">
      [1] キャラ違い<small>顔・髪・体・服が指定と違う</small>
    </button>
    <button class="ng" data-reason="技術破綻">
      [2] 技術破綻<small>解剖学的崩れ、AIノイズ、画質</small>
    </button>
    <button class="ng" data-reason="ポーズ/構図不適">
      [3] ポーズ/構図不適<small>求めた絵じゃない、構図破綻</small>
    </button>
    <button class="ng" data-reason="演出不適">
      [4] 演出不適<small>ライティング・色調・雰囲気</small>
    </button>
    <button class="ng" data-reason="衣装/小物不適">
      [5] 衣装/小物不適<small>服装・装飾・持ち物が違う</small>
    </button>
    <button class="ng" data-reason="その他">
      [6] その他<small>上記に当てはまらない</small>
    </button>
  </div>
  <div class="row">
    <button id="btn-prev">&larr; 前へ</button>
    <button id="btn-next">次へ &rarr;</button>
  </div>
</footer>
<script>
  const NG_REASONS_BY_KEY = {
    '1': 'キャラ違い',
    '2': '技術破綻',
    '3': 'ポーズ/構図不適',
    '4': '演出不適',
    '5': '衣装/小物不適',
    '6': 'その他',
  };

  const datasetSelect = document.getElementById('dataset-select');
  const datasetsList = document.getElementById('datasets-list');
  const targetInput = document.getElementById('target-dataset-input');
  const counter = document.getElementById('counter');
  const img = document.getElementById('current-image');
  const captionDisplay = document.getElementById('caption-display');
  const commentInput = document.getElementById('comment-input');
  const singleControls = document.getElementById('single-controls');
  const allControls = document.getElementById('all-controls');

  let pending = [];
  let index = 0;
  let mode = 'single';
  let currentStatus = 'pending';

  document.querySelectorAll('input[name="mode"]').forEach((radio) => {
    radio.addEventListener('change', () => {
      mode = radio.value;
      singleControls.style.display = mode === 'single' ? '' : 'none';
      allControls.style.display = mode === 'all' ? '' : 'none';
      loadPending();
    });
  });

  document.querySelectorAll('input[name="status"]').forEach((radio) => {
    radio.addEventListener('change', () => {
      currentStatus = radio.value;
      loadPending();
    });
  });

  async function loadDatasets() {
    const res = await fetch('/imagejudge/datasets');
    const datasets = await res.json();
    datasetSelect.innerHTML = '';
    datasetsList.innerHTML = '';
    for (const name of datasets) {
      const opt = document.createElement('option');
      opt.value = name;
      opt.textContent = name;
      datasetSelect.appendChild(opt);

      const dlOpt = document.createElement('option');
      dlOpt.value = name;
      datasetsList.appendChild(dlOpt);
    }
    await loadPending();
  }

  async function loadPending() {
    if (mode === 'all') {
      const res = await fetch('/imagejudge/pending-all');
      pending = await res.json();
    } else {
      if (!datasetSelect.value) {
        pending = [];
      } else {
        const url = '/imagejudge/list?dataset=' + encodeURIComponent(datasetSelect.value) + '&status=' + currentStatus;
        const res = await fetch(url);
        pending = await res.json();
      }
    }
    index = 0;
    render();
  }

  function currentItemDataset(item) {
    return mode === 'all' ? item.dataset : datasetSelect.value;
  }

  function currentItemStatus() {
    return mode === 'all' ? 'pending' : currentStatus;
  }

  function render() {
    if (pending.length === 0) {
      img.removeAttribute('src');
      captionDisplay.textContent = '(該当なし)';
      counter.textContent = '';
      commentInput.value = '';
      return;
    }
    if (index < 0) index = 0;
    if (index >= pending.length) index = pending.length - 1;
    const item = pending[index];
    const itemDataset = currentItemDataset(item);
    const itemStatus = currentItemStatus();
    img.src = '/imagejudge/image/' + encodeURIComponent(itemDataset) + '/' + encodeURIComponent(itemStatus) + '/' + encodeURIComponent(item.stem) + '.png';
    captionDisplay.innerHTML = '';
    if (mode === 'all') {
      const tag = document.createElement('span');
      tag.className = 'source-dataset';
      tag.textContent = '[' + item.dataset + ']';
      captionDisplay.appendChild(tag);
    }
    captionDisplay.appendChild(document.createTextNode(item.caption || ''));
    if (item.judgment === 'ng' && item.ng_reason) {
      const reasonTag = document.createElement('span');
      reasonTag.className = 'current-ng-reason';
      reasonTag.textContent = '[NG: ' + item.ng_reason + ']';
      captionDisplay.appendChild(reasonTag);
    }
    commentInput.value = item.comment || '';
    counter.textContent = (index + 1) + ' / ' + pending.length;
  }

  async function judge(verdict, ngReason) {
    if (pending.length === 0) return;
    const item = pending[index];
    const itemDataset = currentItemDataset(item);
    const fromStatus = currentItemStatus();

    if (mode === 'single' && fromStatus === verdict) {
      if (verdict === 'ok') return;
      if (verdict === 'ng' && (item.ng_reason || '') === (ngReason || '')) return;
    }

    const body = {
      dataset: itemDataset,
      stem: item.stem,
      judgment: verdict,
      comment: commentInput.value,
      from_status: fromStatus,
    };
    if (verdict === 'ng') {
      if (!ngReason) {
        alert('NG 理由を選択してください');
        return;
      }
      body.ng_reason = ngReason;
    }
    if (mode === 'all') {
      const target = targetInput.value.trim();
      if (!target) {
        alert('集約先 dataset 名を入力してください');
        return;
      }
      body.target_dataset = target;
    }
    const res = await fetch('/imagejudge/judge', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });
    if (!res.ok) {
      alert('判定に失敗しました (status=' + res.status + ')');
      return;
    }
    pending.splice(index, 1);
    render();
  }

  document.getElementById('btn-ok').addEventListener('click', () => judge('ok'));
  document.querySelectorAll('button.ng[data-reason]').forEach((btn) => {
    btn.addEventListener('click', () => judge('ng', btn.dataset.reason));
  });
  document.getElementById('btn-prev').addEventListener('click', () => { index--; render(); });
  document.getElementById('btn-next').addEventListener('click', () => { index++; render(); });
  datasetSelect.addEventListener('change', loadPending);

  document.addEventListener('keydown', (e) => {
    if (document.activeElement === commentInput || document.activeElement === targetInput) return;
    if (e.key === 'o' || e.key === 'O') { e.preventDefault(); judge('ok'); }
    else if (NG_REASONS_BY_KEY[e.key]) { e.preventDefault(); judge('ng', NG_REASONS_BY_KEY[e.key]); }
    else if (e.key === 'ArrowLeft') { e.preventDefault(); index--; render(); }
    else if (e.key === 'ArrowRight') { e.preventDefault(); index++; render(); }
  });

  loadDatasets();
</script>
</body>
</html>
